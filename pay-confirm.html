<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>支付确认 - 诡谜局</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Serif SC','STSong','SimSun',serif;background:#0a0808;color:#e8ddd0;display:flex;justify-content:center;align-items:center;min-height:100dvh;padding:20px}
.card{background:#141010;border:1px solid #2a1f1a;border-radius:12px;padding:40px 30px;text-align:center;max-width:380px;width:100%}
.icon{font-size:48px;margin-bottom:16px}
h1{font-size:20px;font-weight:700;color:#c9a04a;margin-bottom:8px}
p{font-size:13px;color:#8a7a6a;line-height:1.8;margin-bottom:20px}
.loader{display:inline-block;width:20px;height:20px;border:2px solid #2a1f1a;border-top-color:#c9a04a;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.btn{display:inline-block;padding:12px 32px;border-radius:8px;border:none;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none}
.btn-gold{background:linear-gradient(135deg,#c9a04a,#8a6a2a);color:#1a1a0a}
.btn-ghost{background:transparent;border:1px solid #2a1f1a;color:#8a7a6a;margin-right:10px}

/* 二维码 */
.qr-container{display:flex;flex-direction:column;align-items:center;padding:16px;margin:12px 0;background:#fff;border-radius:8px}
.qr-container canvas,.qr-container img{width:180px;height:180px}
.qr-hint{font-size:11px;color:#666;margin-top:8px}

/* 金额 */
.price-row{font-size:28px;font-weight:700;color:#c9a04a;margin:8px 0}
.price-label{font-size:12px;color:#8a7a6a}

/* 支付中动画 */
.paying-dots::after{content:'';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}100%{content:''}}
</style>
</head>
<body>
<div class="card">
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">正在确认支付...</h1>
  <div class="loader" id="loader"></div>
  <p id="msg">请稍候，正在确认您的支付状态</p>
  <div id="qr-area"></div>
</div>

<script src="https://static.cloudbase.net/cloudbase-js-sdk/2.28.6/cloudbase.full.js"></script>
<script>
(async function() {
  const urlParams = new URLSearchParams(window.location.search);
  const orderId = urlParams.get('orderId');
  const codeUrl = urlParams.get('codeUrl');  // 微信扫码支付的 code_url

  if (!orderId) {
    showState('❌', '参数错误', '缺少订单信息，请返回游戏重新尝试');
    return;
  }

  try {
    // 初始化 CloudBase
    const app = cloudbase.init({ env: 'ai-native-d6gdsx2agc8c46199' });
    const auth = app.auth;
    await auth.signInAnonymously();

    // ===== 微信 Native 扫码支付模式 =====
    if (codeUrl) {
      showState('📱', '微信扫码支付', '');
      hideLoader();
      renderQRCode(codeUrl, orderId);
      startPolling(app, orderId);
      return;
    }

    // ===== 模拟支付模式 =====
    const result = await app.callFunction({
      name: 'handlePayment',
      data: { action: 'checkOrder', orderId }
    });

    if (result.result && result.result.data && result.result.data.paid) {
      showState('✅', '解锁成功！', '全部90道谜题已解锁，返回游戏开始挑战吧！');
      hideLoader();
    } else {
      // 显示模拟支付按钮
      showState('💰', '确认支付', '');
      hideLoader();
      showMockPayButton(app, orderId);
    }
  } catch(e) {
    showState('❌', '出错了', e.message || '请返回游戏重新尝试');
    hideLoader();
  }

  // ===== 辅助函数 =====
  function showState(icon, title, msg) {
    document.getElementById('icon').textContent = icon;
    document.getElementById('title').textContent = title;
    document.getElementById('msg').textContent = msg;
  }

  function hideLoader() {
    document.getElementById('loader').style.display = 'none';
  }

  // 渲染微信扫码支付二维码
  function renderQRCode(codeUrl, orderId) {
    const qrArea = document.getElementById('qr-area');
    // 使用 Canvas 绘制二维码（纯前端方案，无需额外库）
    // 简单方式：用 img 加载 Google Chart API 或 qrcode.js
    // 这里使用 img 标签加载 code_url 对应的二维码图片
    qrArea.innerHTML = `
      <div class="qr-container">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(codeUrl)}"
             alt="微信扫码支付" width="180" height="180"
             onerror="this.parentElement.innerHTML='<p style=color:#666>二维码加载失败，<br>请用微信扫描以下链接支付：<br><small>${escapeHtml(codeUrl)}</small></p>'">
        <div class="qr-hint">📱 请使用微信扫一扫支付</div>
      </div>
      <div class="price-row" id="pay-amount">--</div>
      <p class="paying-dots" style="color:#c9a04a;">等待支付中</p>
    `;

    // 获取金额
    app.callFunction({
      name: 'handlePayment',
      data: { action: 'checkOrder', orderId }
    }).then(res => {
      // 尝试从 URL 参数获取金额（如果有的话）
    }).catch(() => {});
  }

  function showMockPayButton(app, orderId) {
    const btn = document.createElement('button');
    btn.className = 'btn btn-gold';
    btn.textContent = '确认支付 ¥6.99';
    btn.onclick = async function() {
      btn.disabled = true;
      btn.textContent = '处理中...';

      // 标记支付完成
      const db = app.database();
      await db.collection('orders')
        .where({ orderId })
        .update({ status: 'paid', paidAt: new Date() });

      // 写入解锁记录
      await db.collection('user_unlocks').add({
        productId: 'unlock_all_90',
        unlockedAt: new Date()
      });

      showState('✅', '解锁成功！', '全部90道谜题已解锁！返回游戏开始挑战吧');
      btn.remove();
    };
    document.querySelector('.card').appendChild(btn);
  }

  // 轮询订单状态（扫码支付模式）
  async function startPolling(app, orderId) {
    let attempts = 0;
    const maxAttempts = 120; // 4 分钟（每 2 秒一次）

    const poll = setInterval(async () => {
      attempts++;
      try {
        const result = await app.callFunction({
          name: 'handlePayment',
          data: { action: 'checkOrder', orderId }
        });

        if (result.result && result.result.data && result.result.data.paid) {
          clearInterval(poll);
          document.getElementById('qr-area').innerHTML = '';
          showState('✅', '支付成功！', '全部90道谜题已解锁，返回游戏开始挑战吧！');
          hideLoader();
        }
      } catch(e) {
        console.warn('轮询失败:', e.message);
      }

      if (attempts >= maxAttempts) {
        clearInterval(poll);
        document.getElementById('qr-area').innerHTML +=
          '<p style="color:#8a7a6a;margin-top:8px;">支付确认超时，如已付款请稍后刷新</p>';
      }
    }, 2000);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
})();
</script>
</body>
</html>
