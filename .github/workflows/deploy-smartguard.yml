name: Deploy SmartGuard Frontend

on:
  push:
    branches: [main]
    paths:
      - 'smartguard/client/**'
      - 'smartguard/server/**'
      - '.github/workflows/deploy-smartguard.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install & Build frontend
        working-directory: smartguard/client
        env:
          # 生产前端指向 Render 后端（部署后端后自动生效）
          VITE_API_BASE: https://zhiweitong-smartguard.onrender.com
        run: |
          npm install
          npm run build -- --base /guimiju/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: smartguard/client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
