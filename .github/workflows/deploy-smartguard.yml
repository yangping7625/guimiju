name: Deploy SmartGuard Prototype to Pages

# 纯静态部署：直接把 prototype.html 发到 GitHub Pages（零构建、零依赖）
# 与另三个作品集项目（ai-eval-lab / data-qc-dashboard / intern-assistant）同策略

on:
  push:
    branches: [main]
    paths:
      - 'smartguard/prototype.html'
      - '.github/workflows/deploy-smartguard.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-smartguard
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp smartguard/prototype.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
