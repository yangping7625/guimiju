<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智维通 SmartGuard · AI 智能运维平台</title>
<style>
/* ─── 全局 ─────────────────────────────── */
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --primary: #00e396; --primary-dim: #1a3a2a;
}
body.scene-auto {
  --primary: #57c7ff; --primary-dim: #1a2a40;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #0a0e1a; color: #d0d5e0; display: flex; height: 100vh; overflow: hidden;
}

/* ─── 侧边栏 ───────────────────────────── */
.sidebar {
  width: 220px; background: #0d1125; border-right: 1px solid #1a2040;
  padding: 20px 0; display: flex; flex-direction: column; flex-shrink: 0;
}
.logo {
  padding: 0 20px 24px; font-size: 18px; font-weight: 700; color: var(--primary);
  display: flex; align-items: center; gap: 10px;
}
.logo svg { width: 28px; height: 28px; }
.nav-item {
  padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px;
  font-size: 14px; color: #8892b0; transition: all 0.2s; border-left: 3px solid transparent;
}
.nav-item:hover { background: #141a35; color: #ccd6f6; }
.nav-item.active { background: #141a35; color: var(--primary); border-left-color: var(--primary); }
.nav-item .icon { width: 18px; text-align: center; }
.nav-section { font-size: 11px; color: #495670; padding: 16px 20px 8px; text-transform: uppercase; letter-spacing: 1px; }

/* ─── 场景切换 Tab ──────────────────────── */
.scene-tabs {
  display: flex; gap: 4px; padding: 8px 28px; background: #0a0e1a;
  border-bottom: 1px solid #1a2040;
}
.scene-tab {
  padding: 7px 18px; border-radius: 8px 8px 0 0; cursor: pointer;
  font-size: 13px; color: #495670; border: 1px solid transparent;
  transition: all 0.2s; display: flex; align-items: center; gap: 6px;
}
.scene-tab:hover { color: #8892b0; }
.scene-tab.active {
  color: var(--primary); background: #0d1125;
  border-color: #1a2040; border-bottom-color: #0d1125;
  font-weight: 600;
}
.scene-tab .dot {
  width: 7px; height: 7px; border-radius: 50%;
}

/* ─── 主内容区 ─────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.header {
  padding: 14px 28px; background: #0d1125; border-bottom: 1px solid #1a2040;
  display: flex; justify-content: space-between; align-items: center;
}
.header h1 { font-size: 20px; font-weight: 600; color: #e6f1ff; }
.header .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.content { flex: 1; overflow-y: auto; padding: 24px 28px; }

/* ─── 统计卡片 ─────────────────────────── */
.stat-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: #111836; border: 1px solid #1a2040; border-radius: 10px; padding: 20px;
  cursor: pointer; transition: all 0.2s;
}
.stat-card:hover { border-color: #2a3a6a; transform: translateY(-2px); }
.stat-card .label { font-size: 13px; color: #8892b0; margin-bottom: 8px; }
.stat-card .value { font-size: 30px; font-weight: 700; }
.stat-card .sub { font-size: 12px; color: #495670; margin-top: 4px; }
.card-green .value { color: #00e396; }
.card-red .value { color: #ff5555; }
.card-yellow .value { color: #ffb86c; }
.card-blue .value { color: #57c7ff; }

/* ─── 两栏布局 ─────────────────────────── */
.two-col { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px; }

/* ─── 面板 ─────────────────────────────── */
.panel {
  background: #111836; border: 1px solid #1a2040; border-radius: 10px; overflow: hidden;
}
.panel-header {
  padding: 16px 20px; border-bottom: 1px solid #1a2040; font-size: 15px; font-weight: 600;
  display: flex; justify-content: space-between; align-items: center;
}
.panel-body { padding: 0; overflow-x: auto; }

/* ─── 表格 ─────────────────────────────── */
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px 20px; font-size: 12px; color: #495670; font-weight: 500; border-bottom: 1px solid #1a2040; }
td { padding: 12px 20px; font-size: 13px; border-bottom: 1px solid #0d1125; }
tr:hover td { background: #141a35; }

/* ─── 状态标签 ─────────────────────────── */
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 500;
}
.badge-normal { background: rgba(0,227,150,0.15); color: #00e396; }
.badge-warning { background: rgba(255,184,108,0.15); color: #ffb86c; }
.badge-fault { background: rgba(255,85,85,0.15); color: #ff5555; }
.badge-offline { background: rgba(73,86,112,0.15); color: #495670; }

/* ─── 报警列表 ─────────────────────────── */
.alert-item {
  display: flex; align-items: center; padding: 14px 20px; border-bottom: 1px solid #0d1125;
  gap: 12px; cursor: pointer; transition: background 0.15s;
}
.alert-item:hover { background: #141a35; }
.alert-icon { font-size: 18px; flex-shrink: 0; }
.alert-info { flex: 1; min-width: 0; }
.alert-title { font-size: 13px; font-weight: 500; }
.alert-time { font-size: 11px; color: #495670; margin-top: 2px; }
.alert-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot-red { background: #ff5555; }
.dot-yellow { background: #ffb86c; }

/* ─── AI 诊断区域 ──────────────────────── */
.ai-box {
  margin-top: 20px; background: linear-gradient(135deg, #111836 0%, #0d2030 100%);
  border: 1px solid #1a3a50; border-radius: 10px; padding: 20px;
}
.ai-box h3 { font-size: 14px; color: #57c7ff; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.ai-result {
  background: #0a1225; border-radius: 8px; padding: 16px;
  font-size: 13px; line-height: 1.7; min-height: 60px; color: #8892b0;
}
.ai-result .highlight { color: #ffb86c; font-weight: 600; }
.ai-btn {
  margin-top: 12px; padding: 10px 24px; background: #1a3a50; color: #57c7ff;
  border: 1px solid #2a5a80; border-radius: 8px; cursor: pointer; font-size: 13px;
  transition: all 0.2s;
}
.ai-btn:hover { background: #1a4a6a; }

/* ─── 响应式 ───────────────────────────── */
@media (max-width: 1200px) { .stat-cards { grid-template-columns: repeat(2, 1fr); } .two-col { grid-template-columns: 1fr; } }

/* ─── 弹窗 ─────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
  justify-content: center; align-items: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #111836; border: 1px solid #1a3a50; border-radius: 12px; padding: 28px;
  width: 480px; max-height: 70vh; overflow-y: auto;
}
.modal h3 { font-size: 16px; color: #e6f1ff; margin-bottom: 8px; }
.modal .device-name { color: #57c7ff; font-size: 14px; margin-bottom: 16px; }
.modal .reading { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1a2040; }
.modal .reading .metric { color: #8892b0; font-size: 13px; }
.modal .reading .val { font-size: 14px; font-weight: 600; }
.modal .close-btn {
  margin-top: 16px; width: 100%; padding: 10px; background: #1a2040; color: #ccd6f6;
  border: 1px solid #2a3a6a; border-radius: 8px; cursor: pointer; font-size: 13px;
}
</style>
</head>

    `✅ <b>诊断完成</b> (诊断编号 #D${String(diagnosisCount+1).padStart(4,'0')})<br><br>
    📊 <b>全产线设备健康度: <span class="highlight">85.7%</span></b><br><br>
    ⚠️ <span class="highlight">2 台设备需关注：</span><br>
    1. <b>焊接机器人-RB02</b> — 焊点温度持续偏高，<span class="highlight">建议 4 小时内停机检查</span>，怀疑冷却液循环泵效率下降<br>
    2. <b>涂装机器人-PT02</b> — 喷枪雾化器异常，<span class="highlight">建议立即派单更换雾化器</span>，继续使用将影响涂装合格率<br><br>
    💡 <b>AI 预测：</b>焊接机器人-RB01 送丝速度趋势显示 120 小时后可能触发报警，建议下次定期保养时提前更换送丝轮。`,
    `✅ <b>诊断完成</b> (诊断编号 #D${String(diagnosisCount+1).padStart(4,'0')})<br><br>
    📊 <b>全产线设备健康度: <span class="highlight">88.9%</span></b><br><br>
    ⚠️ <span class="highlight">1 台设备需关注：</span><br>
    1. <b>焊接机器人-RB02</b> — 本次巡检温度回落至 74℃，<span class="highlight">持续监控</span>，趋势分析提示可能为间歇性问题<br><br>
    💡 当前班次预计产出 2,180 台白车身，设备运转正常率 91.2%，较昨日提升 1.5%。`
  ],
  deviceReadings: [
    { metric:'伺服电机转速', valFn:()=>(1420+Math.random()*80).toFixed(0)+' rpm', ok:true },
    { metric:'主轴振动', valFn:()=>(0.8+Math.random()*1.2).toFixed(2)+' mm/s', ok:true },
    { metric:'液压压力', valFn:()=>(15.5+Math.random()*2).toFixed(1)+' MPa', ok:true },
    { metric:'电机温度', valFn:()=>(48+Math.random()*6).toFixed(1)+' ℃', ok:true },
    { metric:'电流负载', valFn:()=>(62+Math.random()*12).toFixed(1)+' %', ok:true },
  ]
};

// ─── 获取当前场景数据 ──────────────────
function S() { return currentScene === 'solar' ? SOLAR : AUTO; }

// ─── 场景切换 ──────────────────────────
function switchScene(scene) {
  currentScene = scene;
  document.body.className = 'scene-' + scene;

  // 更新 Tab 样式
  document.getElementById('tabSolar').classList.toggle('active', scene === 'solar');
  document.getElementById('tabAuto').classList.toggle('active', scene === 'auto');

  // 更新头部
  document.getElementById('sceneTitle').textContent = S().title;
  document.getElementById('sceneStatus').textContent = S().status;

  // 重新渲染
  renderAll();
}

// ─── 渲染统计卡片 ──────────────────────
function renderStats() {
  const sc = S();
  const container = document.getElementById('statCards');
  const alertDevices = sc.devices.filter(d => d.status !== 'normal').length;

  container.innerHTML = sc.stats.map((s, i) => {
    let val = s.value;
    if (i === 1) val = alertDevices; // 动态异常数
    let extra = '';
    if (s.filter) {
      extra = `onclick="filterDevices('alert')" style="cursor:pointer;"`;
    }
    return `<div class="stat-card ${s.cls}" ${extra}>
      <div class="label">${s.label}</div>
      <div class="value">${val}</div>
      <div class="sub">${s.sub}</div>
    </div>`;
  }).join('');
}

// ─── 渲染设备表格 ──────────────────────
function renderDevices(filter='all') {
  const sc = S();
  const tbody = document.getElementById('deviceTable');
  let devices = filter === 'all' ? sc.devices : sc.devices.filter(d => d.status !== 'normal');

  tbody.innerHTML = devices.map(d => `
    <tr onclick="showDeviceDetail(${d.id})" style="cursor:pointer;">
      <td style="color:#57c7ff;">${d.name}</td>
      <td>${d.type}</td>
      <td style="color:#8892b0;">${d.location}</td>
      <td><span class="badge badge-${d.status}">${
        d.status==='normal'?'正常':d.status==='warning'?'预警':d.status==='fault'?'故障':'离线'
      }</span></td>
      <td style="color:#495670;">${d.lastCheck}</td>
    </tr>
  `).join('');
}

// ─── 渲染报警列表 ──────────────────────
function renderAlerts() {
  const sc = S();
  const list = document.getElementById('alertList');
  list.innerHTML = sc.alerts.map(a => `
    <div class="alert-item">
      <span class="alert-icon">${a.level==='fault'?'🔴':a.level==='warning'?'🟡':'🔵'}</span>
      <div class="alert-info">
        <div class="alert-title">${a.device} · ${a.title}</div>
        <div class="alert-time">${a.time}</div>
      </div>
      <div class="alert-dot ${a.level==='fault'?'dot-red':'dot-yellow'}"></div>
    </div>
  `).join('');
}

// ─── 设备详情弹窗 ──────────────────────
function showDeviceDetail(id) {
  const sc = S();
  const d = sc.devices.find(x => x.id === id);
  if (!d) return;

  document.getElementById('modalContent').innerHTML = `
    <h3>${d.name} · 实时监测数据</h3>
    <div class="device-name">${d.type} · ${d.location}</div>
    ${sc.deviceReadings.map(r => `
      <div class="reading">
        <span class="metric">${r.metric}</span>
        <span class="val" style="color:${r.ok?'#00e396':'#ff5555'}">${r.valFn()}</span>
      </div>
    `).join('')}
    <div style="margin-top:12px;font-size:12px;color:#495670;">数据更新: ${new Date().toLocaleTimeString()}</div>
    <button class="close-btn" onclick="closeModal()">关闭</button>
  `;
  document.getElementById('deviceModal').classList.add('show');
}

function closeModal() {
  document.getElementById('deviceModal').classList.remove('show');
}

// ─── AI 诊断 ──────────────────────────
function runAIDiagnosis() {
  const sc = S();
  const resultBox = document.getElementById('aiResult');
  const totalDevices = sc.devices.length;
  resultBox.innerHTML = `⏳ <span style="color:#ffb86c;">AI 正在分析全场景 ${totalDevices} 台设备数据...</span>`;

  setTimeout(() => {
    diagnosisCount++;
    const reports = sc.aiResult;
    resultBox.innerHTML = reports[diagnosisCount % reports.length]
      .replace(/D\d{4}/, 'D' + String(diagnosisCount).padStart(4, '0'));
    document.getElementById('aiSection').scrollIntoView({ behavior:'smooth' });
  }, 1500);
}

// ─── 筛选 ──────────────────────────────
function filterDevices(type) {
  renderDevices(type);
}

// ─── 全部渲染 ──────────────────────────
function renderAll() {
  renderStats();
  renderDevices();
  renderAlerts();
}

// ─── 点击遮罩关闭弹窗 ──────────────────
document.getElementById('deviceModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── 页面启动 ──────────────────────────
renderAll();
</script>
